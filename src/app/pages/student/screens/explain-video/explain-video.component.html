<section
  class="flex items-center justify-center w-full min-h-screen pt-20 pb-10 bg-slate-50"
>
  <div
    class="flex flex-col items-center w-full px-4 py-10 mx-auto bg-white shadow-2xl rounded-3xl md:w-11/12 max-w-[1500px]"
  >
    <h1
      class="mb-10 text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-primaryAdmin to-secondaryAdmin md:text-5xl"
    >
      شرح المنصة بالكامل
    </h1>

    <div class="relative w-full">
      @if (!isPlaying()) {
        <div
          class="relative w-full cursor-pointer h-[15rem] md:h-[25rem] overflow-hidden rounded-2xl shadow-2xl group"
          (click)="isPlaying.set(true)"
        >
          <img
            [src]="getThumbnailUrl()"
            class="object-cover w-full h-full transition-transform duration-1000 group-hover:scale-110"
          />
          <!-- Overlay -->
          <div
            class="absolute inset-0 transition-opacity duration-300 bg-black bg-opacity-40 group-hover:bg-opacity-20 flex items-center justify-center"
          >
            <div
              class="p-8 transition-all duration-500 bg-primary bg-opacity-95 rounded-full shadow-[0_0_60px_rgba(54,178,144,0.6)] group-hover:scale-125"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-20 h-20 text-white"
                fill="currentColor"
                viewBox="0 0 24 24"
              >
                <path d="M8 5v14l11-7z" />
              </svg>
            </div>
          </div>
        </div>
      } @else {
        <div
          class="w-full overflow-hidden rounded-2xl h-[15rem] md:h-[25rem] bg-black shadow-2xl border-2 border-gray-100"
          id="plyr-player"
        >
          <iframe
            [src]="getEmbedUrl() | safeUrl"
            allowfullscreen
            allowtransparency
            allow="autoplay"
            class="w-full h-8/12"
          ></iframe>
        </div>
      }
    </div>
  </div>
</section>
