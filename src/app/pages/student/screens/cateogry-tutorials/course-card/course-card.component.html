<div
  class="col-span-1 mb-16 transition-all duration-500 bg-white border-2 rounded-lg cursor-pointer hover:scale-105 lg:mb-0"
>
  <div
    (click)="goToTutorial(tutorial.id)"
    class="flex flex-col w-full px-4 pt-4"
  >
    <div
      class="relative flex items-center justify-center object-cover object-bottom w-full overflow-hidden rounded-md shadow max-h-72 min-h-72 bg-slate-200 aspect-w-1 aspect-h-1 group-hover:opacity-75"
    >
      @if (tutorial.img) {
      <img
        class="object-cover object-center w-full h-full"
        [src]="tutorial.img"
        [alt]="tutorial.name"
      />
      }@else {
      <span
        class="flex flex-col items-center justify-center w-full h-full text-gray-400"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-16 h-16"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"
          ></path>
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"
          ></path>
        </svg>
        <span class="mt-2 text-lg font-bold uppercase">No Image</span>
      </span>
      }
    </div>
    <div class="flex flex-col self-start w-full px-2 my-6 text-right gap-y-4">
      <div class="flex flex-col md:flex-row gap-y-2 md:justify-between">
        <div class="flex text-base gap-x-2">
          @if (!tutorial.isBought) {
          <p class="text-lg line-through text-textNav">
            {{ tutorial.priceBeforeDiscount | currency : " " }} ر.س
          </p>
          <p class="text-orange-400">
            {{ tutorial.price | currency : " " }} ر.س
          </p>
          }@else {
          <p
            class="font-semibold text-green-600 border bg-green-100 px-4 rounded-lg text-lg py-1.5"
          >
            تم الشراء
          </p>

          }
        </div>
        <h3 class="text-lg text-textNav">
          {{ tutorial.subCategoryName }}
        </h3>
      </div>
      <h2
        class="text-2xl font-semibold leading-[40px] text-center md:text-3xl text-primary"
      >
        دورة
        {{ tutorial.name }}
      </h2>
    </div>
    <div class="flex justify-between px-2 py-4 border-t-2 basis-full">
      <div class="flex items-center text-lg text-textNav gap-x-2">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="size-7"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z"
          ></path>
        </svg>
        <span> أ. {{ tutorial.teacherName }}</span>
      </div>
      <button class="grid place-items-center">
        <a
          [ngClass]="
            tutorial.price !== 0 ? 'bg-secondary' : 'bg-primary'
          "
          class="px-3 py-3 font-semibold text-white transition-all border rounded-full md:px-8 w-fit"
        >
          @if (tutorial.price !== 0) {
          <span>المزيد </span>
          }@else {
          <span>مجانية</span>
          }
        </a>
      </button>
    </div>
  </div>
</div>
