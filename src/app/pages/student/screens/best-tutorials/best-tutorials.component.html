<div class="pt-24 pb-16 m-auto">
  <div class="relative">
    <div
      class="absolute"
      [ngClass]="{
        '!bg-opacity-100 bg-white z-10 w-full h-screen': isLoading()
      }"
    ></div>
    <div
      class="grid grid-cols-1 gap-8 px-4 mt-8 md:px-16 md:grid-cols-2 lg:grid-cols-3"
    >
      @for (tutorial of tutorials; track tutorial.id) {
      <app-course-card [tutorial]="tutorial" />
      }
    </div>
    @if(isLoading()) {
    <div
      class="fixed z-50 top-[50%] left-[50%] -translate-x-1/2 -translate-y-1/2 bg-opacity-60"
    >
      <div class="relative flex items-center justify-center">
        <div
          class="absolute border-t-4 border-b-4 rounded-full border-secondaryAdmin w-36 h-36 animate-spin"
        ></div>
        <img
          src="assets/imgs/logo2.webp"
          alt="logo"
          loading="lazy"
          class="rounded-full h-28 w-28"
        />
      </div>
    </div>
    }
  </div>
</div>
