<section
  class="flex flex-col px-6 pt-8 pb-16 mx-auto mb-24 bg-white border-2 shadow-lg gap-y-12 mt-36 max-w-7xl rounded-xl"
>
  <div
    class="flex flex-col items-center justify-between w-full gap-y-4 md:flex-row"
  >
    <h1 class="text-2xl font-semibold md:text-3xl text-primaryAdmin">
      مقالات هامة
    </h1>
    <div class="relative w-full max-w-md">
      <input
        type="text"
        placeholder="بحث..."
        [(ngModel)]="keyWord"
        (input)="search()"
        class="w-full py-2.5 pl-10 pr-4 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500"
      />
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="absolute w-5 h-5 text-gray-400 left-3 top-3"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M21 21l-4.35-4.35M10 18a8 8 0 100-16 8 8 0 000 16z"
        />
      </svg>
    </div>
  </div>
  @if (!isLoading()) { @for (item of allArticle; track item.id) {
  <details class="w-full ps-4" dir="rtl">
    <summary (click)="getDetails(item.id)" class="w-fit">
      {{ item.title }}
    </summary>
    @if (articleId == item.id && !isLoadingOne()) {
    <div
      class="flex flex-col items-center justify-between w-full p-4 space-y-4 md:flex-row md:space-y-0 md:space-x-4"
    >
      <article
        [innerHTML]="article.content | preserveNewlineWithSvg"
        class="flex flex-col w-8/12 text-right"
      ></article>
      <div class="self-start w-4/12">
        <img
          [src]="article.imageUrl"
          alt="Placeholder Image"
          class="object-cover rounded-lg"
        />
      </div>
    </div>
    }
  </details>
  }@empty {
  <p class="text-lg text-red-600">لا تُوجد مقالات بعد.</p>
  } }@else {
  <details dir="rtl">
    <summary class="w-80 h-8 animate-pulse bg-[#78BDC4]"></summary>
  </details>
  <details dir="rtl">
    <summary class="w-80 h-8 animate-pulse bg-[#78BDC4]"></summary>
  </details>
  <details dir="rtl">
    <summary class="w-80 h-8 animate-pulse bg-[#78BDC4]"></summary>
  </details>
  <details dir="rtl">
    <summary class="w-80 h-8 animate-pulse bg-[#78BDC4]"></summary>
  </details>
  <details dir="rtl">
    <summary class="w-80 h-8 animate-pulse bg-[#78BDC4]"></summary>
  </details>
  }
</section>
