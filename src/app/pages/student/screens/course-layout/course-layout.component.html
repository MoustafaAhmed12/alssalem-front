<div class="h-screen">
  @if(!isLoading()){
  <div class="h-[75px] xl:pr-[27rem] fixed inset-y-0 w-full z-40">
    <button
      (click)="show_menu()"
      [ngClass]="
        isShow()
          ? 'absolute top-20 xl:right-[27rem] right-80 text-red-600'
          : 'absolute top-7 right-6'
      "
      class="font-bold transition-all duration-500 hover:scale-125"
    >
      @if (isShow() ) {
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="p-1 bg-white border rounded-md size-10 xl:hidden"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M6 18 18 6M6 6l12 12"
        />
      </svg>
      }@else {
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="size-7"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3.75 5.25h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5"
        />
      </svg>
      }
    </button>
    <app-nav-bar-course />
  </div>
  <div class="relative">
    <div
      class="absolute"
      [ngClass]="{
        '!bg-opacity-100 bg-white z-[150] w-full h-screen': isLoading()
      }"
    ></div>
    <div
      [ngClass]="isShow() ? ' translate-x-0' : ' translate-x-full'"
      class="fixed inset-y-0 z-[100] xl:translate-x-0 flex-col transition-all duration-500 bg-white h-screen xl:flex xl:w-[27rem] w-80"
    >
      <div class="flex flex-col overflow-y-auto border-l shadow-sm h-svh">
        <div class="flex flex-col px-2 border-b py-7">
          <h1
            [routerLink]="['/tutorial/' + tutorialId]"
            class="text-base font-bold text-center cursor-pointer lg:text-xl text-logoColor1"
          >
            دورة {{ allUnits.tutorialName }}
          </h1>
        </div>
        <div class="flex flex-col w-full">
          <app-content-of-course
            [allUnits]="allUnits"
            (itemClicked)="isShow.set($event)"
            [isOpen]="allUnits.isSubscribed"
          />
        </div>
      </div>
    </div>
  </div>
  <main class="h-full pt-[75px] xl:pr-[27rem] transition-all">
    <router-outlet />
  </main>
  } @else {
  <div
    class="fixed z-[200] top-[50%] left-[50%] -translate-x-1/2 -translate-y-1/2 bg-opacity-60"
  >
    <div class="relative flex items-center justify-center">
      <div
        class="absolute border-t-4 border-b-4 rounded-full border-secondaryAdmin w-36 h-36 animate-spin"
      ></div>
      <img
        src="assets/imgs/logo2.webp"
        alt="logo"
        class="rounded-full h-28 w-28"
      />
    </div>
  </div>
  }
</div>
