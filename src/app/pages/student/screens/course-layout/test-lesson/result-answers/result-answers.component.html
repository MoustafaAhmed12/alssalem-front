@if (isLoading()) {
<div class="fixed z-50 top-[40%] left-[30%] bg-opacity-60">
  <div class="flex items-center">
    <div
      class="w-16 h-16 border-8 border-blue-600 border-dashed rounded-full animate-spin"
    ></div>
  </div>
</div>
}@else {
<div>
  <div
    class="flex items-center justify-between w-full px-2 py-2 mx-auto mt-2 border rounded-lg lg:px-8 bg-secondaryAdmin lg:w-11/12"
  >
    <p class="text-base">
      السؤال
      <span class="font-bold text-logoColor1">{{ currentIndex }}</span>
      من
      {{ totalQuestions }}
    </p>
    <h3 class="hidden font-bold truncate lg:block">{{ examResults.name }}</h3>
    <button
      [routerLink]="['/tutorial/' + this.tutorialId + '/exam/' + examId]"
      class="px-4 py-2 text-black transition-colors bg-white border-2 rounded-lg md:px-12 hover:bg-red-700 hover:text-white"
    >
      العودة
    </button>
  </div>
  <div class="px-2 py-4 bg-white rounded-lg lg:px-8">
    <app-review-answers
      [isEnglish]="examResults.isEnglish"
      [choicesCount]="examResults.choicesCount"
      [tutorialId]="tutorialId"
      [examId]="examId"
      [examName]="examResults.name"
      (pageNum)="receiveData($event)"
      (totalQuestions)="receiveDataTotal($event)"
    />
  </div>
</div>
}
