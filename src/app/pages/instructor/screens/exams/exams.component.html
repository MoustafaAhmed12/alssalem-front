<div class="relative">
  <div
    class="absolute"
    [ngClass]="{ '!bg-opacity-60 bg-white z-30 w-full h-full': isLoading }"
  ></div>
  <div class="pt-4 mb-12">
    <app-title-screen [title]="'جميع الأمتحانات'" />
    <form class="container mx-auto my-6">
      <input
        dir="rtl"
        id="globalSearch"
        (input)="onChange($event)"
        class="w-full px-8 text-xl border rounded shadow-sm h-14 focus:border-2 focus:border-sky-600 focus:outline-none focus:shadow-outline"
        type="search"
        placeholder="إبحث ..."
      />
    </form>
    <div class="w-full">
      <h1 class="my-2 text-xl">نسخ امتحان</h1>
      <app-copy-exam
        [allTeacherExamToChoose]="allTeacherExamToChoose"
        (allExams)="fetchAllExams($event)"
      />
    </div>
    <div class="flex flex-col justify-end w-full gap-4 mt-4 md:flex-row">
      <button
        (click)="goToAddExam()"
        class="flex items-center px-4 py-2 text-sm text-white transition-colors border rounded-lg gap-x-2 md:text-lg md:px-6 md:py-2 bg-secondaryAdmin hover:bg-opacity-95"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="w-6 h-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 4.5v15m7.5-7.5h-15"
          />
        </svg>
        إضافة
      </button>
      <button
        (click)="goToAddExam()"
        class="px-6 py-2 font-semibold text-white transition duration-200 bg-purple-600 rounded-lg hover:bg-purple-700"
      >
        إنشاء اختبار (فلترة الأسئلة)
      </button>
      <button
        (click)="openPopup()"
        class="px-6 py-2 font-semibold text-white transition duration-200 bg-blue-600 rounded-lg hover:bg-blue-700"
      >
        إضافة من رقم إلى رقم السوال
      </button>
    </div>
    <ngx-table
      [data]="data"
      [configuration]="configuration"
      #table
      [columns]="columns"
      [noResultsTemplate]="noResultsTemplate"
      [summaryTemplate]="summaryTemplateRef"
    >
    </ngx-table>
    <ng-template #summaryTemplateRef let-total="total">
      <th colspan="6">
        <span class="mb-2 text-logoColor1">عدد الأمتحانات: {{ total }} </span>
      </th>
    </ng-template>
    <ng-template #noResultsTemplate>
      <td [attr.colspan]="columns.length" class="no-results">
        لا تُوجد دورات بعد.
      </td>
    </ng-template>
  </div>
  <!-- edit and delete -->
  <ng-template #actionTpl let-row>
    <div class="flex items-center justify-center gap-x-12">
      <svg
        (click)="edit(row.examId)"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="w-6 h-6 text-green-600 cursor-pointer hover:text-green-700"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10"
        />
      </svg>
      <svg
        (click)="handleOpen(row.examId)"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="w-6 h-6 text-red-600 cursor-pointer hover:text-red-700"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
        />
      </svg>
    </div>
  </ng-template>
  @if (isLoading) {
    <div class="fixed z-50 top-[40%] left-[40rem] bg-opacity-60">
      <div class="flex items-center">
        <div
          class="w-16 h-16 border-8 border-blue-600 border-dashed rounded-full animate-spin"
        ></div>
      </div>
    </div>
  }
</div>

<div
  [ngClass]="{ 'scale-100': isOpen() }"
  class="fixed inset-0 top-0 left-0 right-0 z-[110] md:z-50 grid items-center justify-center w-full h-full transition-transform duration-500 scale-0 bg-gray-50 bg-opacity-60 place-items-center"
>
  <div
    class="flex items-center justify-center mx-auto md:w-[35rem] w-[28rem] px-6"
  >
    <div class="bg-white rounded-lg shadow-sm md:border basis-full">
      <div class="flex justify-between px-8 pt-8 text-center md:text-right">
        <h2 class="text-xl font-bold lg:text-3xl text-primaryAdmin">
          حذف الامتحان
        </h2>
        <button (click)="isOpen.set(false); password = ''">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="w-6 h-6 transition-all duration-500 hover:rotate-180 hover:scale-125 hover:text-red-700"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 18 18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>

      <div class="px-4 py-4 bg-white rounded-lg lg:px-8">
        <div class="rounded-md">
          <div class="mt-3 bg-white rounded-lg">
            <div class="relative bg-inherit">
              <input
                type="text"
                name="password"
                [(ngModel)]="password"
                id="password"
                class="w-full px-4 py-4 my-2 text-lg text-gray-900 placeholder-transparent bg-transparent rounded-lg peer ring-2 ring-gray-500 focus:ring-sky-600 focus:outline-none"
              />
            </div>
          </div>
        </div>
      </div>
      <div class="grid w-full place-items-center">
        <button
          type="button"
          (click)="removeExam()"
          class="flex justify-center px-8 py-3 mb-8 text-xl font-medium text-white transition-colors border-2 border-transparent rounded-lg bg-secondaryAdmin hover:bg-primaryAdmin w-fit focus:outline-none focus:ring-2 focus:ring-offset-2"
        >
          @if (isLoading) {
            <div
              class="w-8 h-8 border-8 border-purple-600 border-dashed rounded-full animate-spin border-t-transparent"
            ></div>
          } @else {
            حذف الامتحان
          }
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Popup Modal -->
@if (isPopupOpen()) {
  <div
    class="fixed p-4 inset-0 z-[5550] flex items-center justify-center bg-black/50"
    (click)="closePopup()"
  >
    <div
      class="w-full max-w-2xl p-6 overflow-y-scroll max-h-[600px] bg-white rounded-lg shadow-xl"
      (click)="$event.stopPropagation()"
    >
      <!-- Header -->
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold text-gray-800">اختبار جديد</h2>
        <button
          (click)="closePopup()"
          class="text-2xl text-gray-500 hover:text-gray-700"
        >
          ×
        </button>
      </div>

      <!-- Form -->
      @if (!isLoadingSave()) {
        <form (ngSubmit)="onSubmit()" #examForm="ngForm">
          <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
            <!-- اسم الاختبار -->
            <div class="mb-4">
              <label class="block mb-2 font-semibold text-gray-700">
                اسم الاختبار
              </label>
              <input
                type="text"
                [(ngModel)]="formData.name"
                name="name"
                required
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="أدخل اسم الاختبار"
              />
            </div>

            <!-- اختيار الدورة -->
            <div class="mb-4">
              <label class="block mb-2 font-semibold text-gray-700">
                الدورة
              </label>
              <select
                [(ngModel)]="formData.tutorialId"
                name="tutorialId"
                required
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
                <option value="" disabled>اختر الدورة</option>
                @for (course of courses(); track $index) {
                  <option [value]="course.id">
                    {{ course.name }}
                  </option>
                }
              </select>
            </div>

            <!-- نسبة النجاح -->
            <div class="mb-4">
              <label class="block mb-2 font-semibold text-gray-700">
                نسبة النجاح (%)
              </label>
              <input
                type="number"
                [(ngModel)]="formData.passingPrecent"
                name="passingPrecent"
                required
                min="0"
                max="100"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="مثال: 70"
              />
            </div>

            <!-- مدة الاختبار -->
            <div class="mb-4">
              <label class="block mb-2 font-semibold text-gray-700">
                مدة الاختبار (بالدقيقة)
              </label>
              <input
                type="number"
                [(ngModel)]="formData.durationInMinutes"
                name="durationInMinutes"
                required
                min="0"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="مثال: 60"
              />
            </div>

            <!-- رقم السؤال من -->
            <div class="mb-4">
              <label class="block mb-2 font-semibold text-gray-700">
                رقم السؤال من
              </label>
              <input
                type="number"
                [(ngModel)]="startQuestion"
                name="startQuestion"
                required
                min="1"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="مثال: 28629"
              />
            </div>

            <!-- رقم السؤال إلى -->
            <div class="mb-4">
              <label class="block mb-2 font-semibold text-gray-700">
                رقم السؤال إلى
              </label>
              <input
                type="number"
                [(ngModel)]="endQuestion"
                name="endQuestion"
                required
                min="1"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                placeholder="مثال: 28688"
              />
            </div>
          </div>

          <!-- Buttons -->
          <div class="flex gap-3 mt-6">
            <button
              type="submit"
              [disabled]="!examForm.form.valid"
              class="flex-1 px-4 py-2 font-semibold text-white transition duration-200 bg-green-600 rounded-lg hover:bg-green-700 disabled:bg-gray-400"
            >
              حفظ
            </button>
            <button
              type="button"
              (click)="closePopup()"
              class="flex-1 px-4 py-2 font-semibold text-white transition duration-200 bg-gray-500 rounded-lg hover:bg-gray-600"
            >
              إلغاء
            </button>
          </div>
        </form>
      } @else {
        <div class="flex items-center justify-center w-full h-96">
          <p class="text-lg font-semibold text-primaryAdmin">جاري الحفظ ...</p>
        </div>
      }
    </div>
  </div>
}
