<div class="p-6">
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-3xl font-bold text-primary">إدارة الخطط</h1>
      <p class="mt-2 text-gray-600">عرض وإدارة خطط الطلاب الدراسية</p>
    </div>
    <a
      routerLink="/super/roadmaps/create"
      class="flex items-center gap-2 px-6 py-3 font-semibold text-white transition-all rounded-xl bg-primary hover:bg-sky-700 hover:shadow-lg active:scale-95"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2"
        stroke="currentColor"
        class="w-5 h-5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 4.5v15m7.5-7.5h-15"
        />
      </svg>
      إنشاء خطة جديدة
    </a>
  </div>

  @if (isLoading()) {
    <div class="flex items-center justify-center h-64">
      <div
        class="w-12 h-12 border-4 border-indigo-200 rounded-full border-t-primary animate-spin"
      ></div>
    </div>
  } @else {
    @if (roadmaps().length > 0) {
      <div
        class="overflow-hidden bg-white border border-gray-100 shadow-sm rounded-2xl"
      >
        <table class="w-full text-center border-collapse">
          <thead>
            <tr class="bg-gray-50">
              <th class="p-4 text-sm font-bold text-gray-700 border-b">
                اسم الخطة
              </th>
              <!-- <th class="p-4 text-sm font-bold text-gray-700 border-b">تاريخ الإنشاء</th> -->
              <!-- <th class="p-4 text-sm font-bold text-gray-700 border-b">عدد الطلاب</th> -->
              <!-- <th class="p-4 text-sm font-bold text-gray-700 border-b">
                الحالة
              </th> -->
              <th
                class="p-4 text-sm font-bold text-gray-700 border-b text-center"
              >
                الإجراءات
              </th>
            </tr>
          </thead>
          <tbody>
            @for (roadmap of roadmaps(); track roadmap.id) {
              <tr class="transition-colors hover:bg-gray-50/50">
                <td class="p-4 border-b">
                  <span class="font-medium text-gray-900">{{
                    roadmap.name
                  }}</span>
                </td>
                <!-- <td class="p-4 text-gray-600 border-b text-sm">
            {{ roadmap.creationDate | date : "dd-MM-yyyy" }}
          </td>
          <td class="p-4 text-gray-600 border-b text-sm">
            {{ roadmap.studentsCount || 0 }}
          </td> -->
                <!-- <td class="p-4 border-b">
            <span
              class="px-3 py-1 text-xs font-semibold rounded-full"
              [ngClass]="{
                'bg-green-100 text-green-700': roadmap.isActive,
                'bg-gray-100 text-gray-600': !roadmap.isActive
              }"
            >
              {{ roadmap.isActive ? "نشط" : "غير نشط" }}
            </span>
          </td> -->
                <td
                  class="p-4 border-b flex justify-center items-center text-center"
                >
                  <a
                    [routerLink]="['/super/roadmaps/edit', roadmap.id]"
                    class="text-primary hover:text-sky-700 transition-colors mx-2"
                    title="تعديل"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      class="h-5 w-5"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
                      />
                    </svg>
                  </a>
                  <button
                    (click)="deleteRoadMap(roadmap.id)"
                    class="text-red-500 hover:text-red-700 transition-colors mx-2"
                    title="حذف"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      class="h-5 w-5"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                      />
                    </svg>
                  </button>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    } @else {
      <div
        class="flex flex-col items-center justify-center h-64 bg-white border border-dashed border-gray-200 rounded-2xl"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="w-16 h-16 text-gray-300"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"
          />
        </svg>
        <p class="mt-4 text-xl font-medium text-gray-500">لا توجد خطط حالياً</p>
        <p class="text-gray-400">ابدأ بإنشاء أول خطة للمدرسة</p>
      </div>
    }
  }
</div>
